asyncapi: '2.6.0'
id: 'urn:com:gusto:embedded-payroll:webhooks'
info:
  title: Gusto Embedded Payroll Webhooks
  version: '1.0.0'
  description: |
    AsyncAPI description of the Gusto Embedded Payroll webhook event surface.

    Gusto Embedded delivers asynchronous event notifications to a partner-hosted
    HTTPS endpoint when state changes occur on resources such as Company,
    Employee, Contractor, Payroll, Form, and related entities. Each subscription
    is created for a specific resource type and one or more event types, and
    payloads are signed with an HMAC-SHA256 signature derived from a
    verification token issued during subscription verification.

    Source: https://docs.gusto.com/embedded-payroll/docs/webhooks-overview
  contact:
    name: Gusto Embedded Payroll Developer Docs
    url: https://docs.gusto.com/embedded-payroll
  license:
    name: Proprietary - Gusto Partner Terms
    url: https://gusto.com/about/terms
  termsOfService: https://gusto.com/about/terms

defaultContentType: application/json

servers:
  partner-endpoint:
    url: '{partner_webhook_url}'
    protocol: https
    description: |
      Partner-hosted HTTPS endpoint registered as the `url` on a Gusto webhook
      subscription. Gusto POSTs JSON event payloads to this URL. Endpoints
      should respond with a 2xx status within 10 seconds; Gusto retries up to
      16 times across roughly 3 days using exponential backoff.
    variables:
      partner_webhook_url:
        default: https://example.com/webhooks/gusto
        description: Absolute HTTPS URL of the partner's webhook receiver.
    security:
      - gustoHmacSignature: []

channels:
