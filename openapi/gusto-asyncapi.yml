components:
  securitySchemes:
    gustoHmacSignature:
      type: httpApiKey
      in: header
      name: X-Gusto-Signature
      description: |
        Each webhook delivery includes the `X-Gusto-Signature` HTTP header,
        whose value is an HMAC-SHA256 of the raw request body computed using
        the `verification_token` that Gusto issued when the partner endpoint
        was verified. Receivers must recompute the HMAC and compare it against
        the header value before processing the payload.

  messageTraits:
    GustoSignedDelivery:
      headers:
        type: object
        properties:
          X-Gusto-Signature:
            type: string
            description: |
              HMAC-SHA256 signature of the raw JSON request body, computed
              using the subscription's `verification_token` as the shared
              secret. Receivers MUST validate this header before trusting the
              payload.
            example: 8c5f1f3b4d2c1e6a9b8f0e7d6c5b4a39281706f5e4d3c2b1a09f8e7d6c5b4a39

  schemas:
    EventEnvelope:
      type: object
      description: |
        Common envelope that every Gusto webhook delivery conforms to. The
        `event_type` field is shaped as `{resource}.{action}` (for example,
        `company.provisioned` or `payroll.paid`).
      required:
        - uuid
        - event_type
        - resource_type
        - resource_uuid
        - entity_type
        - entity_uuid
        - timestamp
      properties:
        uuid:
          type: string
          format: uuid
          description: Unique identifier for the webhook event delivery.
        event_type:
          type: string
          description: Dotted event identifier in the form `{resource}.{action}`.
        resource_type:
          type: string
          description: |
            The subscription resource type. For partner-level subscriptions
            this is typically `Company`; resource-scoped subscriptions echo
            the subscribed resource type.
        resource_uuid:
          type: string
          format: uuid
          description: UUID of the subscription resource.
        entity_type:
          type: string
          description: |
            The actual API resource whose state changed (for example,
            `Employee`, `Payroll`, `Form`).
        entity_uuid:
          type: string
          format: uuid
          description: UUID of the entity whose state changed.
        timestamp:
          type: integer
          format: int64
          description: Unix epoch timestamp (seconds) for when the event occurred.

    BankAccountEventType:
      type: string
      enum:
        - bank_account.created
        - bank_account.updated
        - bank_account.deleted

    CompanyEventType:
      type: string
      enum:
        - company.provisioned
        - company.deprovisioned
        - company.partner_authorized
        - company.migrated
        - company.updated
        - company.onboarded
        - company.approved
        - company.needs_approval
        - company.marked_as_high_risk_business
        - company.marked_as_marijuana_business
        - company.suspended
        - company.unsuspended
        - company.payroll_transfer_completed

    CompanyBenefitEventType:
      type: string
      enum:
        - company_benefit.created
        - company_benefit.updated
        - company_benefit.deleted

    ContractorEventType:
      type: string
      enum:
        - contractor.created
        - contractor.updated
        - contractor.onboarded
        - contractor.deactivated
        - contractor.reactivated
        - contractor.deleted

    ContractorPaymentEventType:
      type: string
      enum:
        - contractor_payment.created
        - contractor_payment.cancelled

    ContractorPaymentGroupEventType:
      type: string
      enum:
        - contractor_payment_group.created
        - contractor_payment_group.cancelled

    DocumentEventType:
      type: string
      enum:
        - document.created
        - document.updated
        - document.signed

    EmployeeEventType:
      type: string
      enum:
        - employee.created
        - employee.updated
        - employee.onboarded
        - employee.marked_for_self_onboarding
        - employee.terminated
        - employee.rehired
        - employee.deleted
        - employee.invited_to_partner_portal

    HomeAddressEventType:
      type: string
      enum:
        - home_address.created
        - home_address.updated
        - home_address.deleted

    WorkAddressEventType:
      type: string
      enum:
        - work_address.created
        - work_address.updated
        - work_address.deleted

    EmployeeBenefitEventType:
