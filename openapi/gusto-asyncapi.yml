        - payroll.created
        - payroll.updated
        - payroll.deleted
        - payroll.calculated
        - payroll.submitted
        - payroll.processed
        - payroll.paid
        - payroll.reversed
        - payroll.partially_reversed
        - payroll.cancelled
        - payroll.processing_failed

    PayScheduleEventType:
