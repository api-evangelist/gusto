    description: |
      Bank Account lifecycle events. Resource type `BankAccount`.
    subscribe:
      summary: Receive Bank Account events from Gusto.
      operationId: receiveBankAccountEvent
      bindings:
        http:
          type: request
          method: POST
          bindingVersion: '0.3.0'
      message:
        $ref: '#/components/messages/BankAccountEvent'

